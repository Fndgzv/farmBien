<div class="modal-overlay">
    <div class="modal-content">

        <h3 class="titulo" style="text-align: center;">Almacen editar producto</h3>

        <div class="modal-body">
        <form [formGroup]="formulario">
            <div class="row">
                <div class="col-md-2 mb-2 etiqueta-misma-linea">
                    <label>Nombre*</label>  
                </div>
                <div class="col-md-10 mb-2">
                    <input type="text" class="form-control" formControlName="nombre">
                </div>
            </div>

            <div class="row">
                <div class="col-md-2 mb-2">
                    <label>Ingred. activos:</label>
                </div>
                <div class="col-md-10 mb-2">
                    <input type="text" class="form-control" formControlName="ingreActivo">
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div class="mismaFila-editor">
                        <div class="mismaFila-fila mb-2">
                            <label>Reng. 1:</label>
                            <input type="text" class="form-control" formControlName="renglon1">
                            <label>Reng. 2:</label>
                            <input type="text" class="form-control" formControlName="renglon2">
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-2 mb-2">
                    <label>Descrip. uso:</label>
                </div>
                <div class="col-md-10 mb-2">
                    <input type="text" class="form-control" formControlName="descripcionUso">
                </div>
            </div>

            <div class="row">
                <div class="col-md-12 mb-2">
                    <div class="mismaFila-editor">
                        <div class="mismaFila-fila">
                            <label for="sintomaInputEditar">Síntomas:</label>
                            <input
                                id="sintomaInputEditar"
                                type="text"
                                class="form-control"
                                [(ngModel)]="sintomaInput"
                                [ngModelOptions]="{standalone: true}"
                                placeholder="Ej. asma, rinitis alergica"
                                (keydown.enter)="$event.preventDefault(); agregarSintoma()"
                            >
                            <button type="button" class="btn-gris-chico" (click)="agregarSintoma()">Agregar</button>
                        </div>
                        <div class="mismaFila-tags" *ngIf="sintomasFormulario.length">
                            <span class="sintoma-tag" *ngFor="let sintoma of sintomasFormulario; let i = index">
                                {{ sintoma }}
                                <button type="button" (click)="quitarSintoma(i)" aria-label="Eliminar sintoma">&times;</button>
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 mb-2">
                    <label>Cod. Barras*</label>
                    <input type="text" formControlName="codigoBarras" class="form-control">
                </div>
                <div class="col-md-4 mb-2">
                    <label>Categoría*</label>
                    <input type="text" formControlName="categoria" class="form-control">
                </div>
                <div class="col-md-3 mb-2">
                    <label>Último proveedor:</label>
                    <select formControlName="ultimoProveedorId" class="form-control">
                        <option [ngValue]="null">— Sin proveedor —</option>
                        <option *ngFor="let pr of proveedores" [ngValue]="pr._id">
                        {{ pr.nombre }}
                        </option>
                    </select>
                </div>
                <div class="col-md-2 mb-2">
                    <label>Unidad:</label>
                    <input type="text" formControlName="unidad" class="form-control">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-2">
                    <label>Laboratorio:</label>
                    <select formControlName="laboratorio" class="form-control">
                        <option [ngValue]="null">-- Sin laboratorio --</option>
                        <option *ngFor="let lab of laboratorios" [ngValue]="lab._id">
                            {{ lab.laboratorio }}
                        </option>
                    </select>
                </div>
                <div class="col-md-2 mb-2">
                    <label >Costo $:</label>
                    <input type="number" formControlName="costo"step="0.1" class="form-control"
                        [readonly]="esServicioMedicoCategoria(formulario.get('categoria')?.value)">
                </div>
                    <div class="col-md-2 mb-2" *ngIf="esServicioMedicoCategoria(formulario.get('categoria')?.value)">
                        <label>Hon. médic. $:</label>
                        <input type="number" formControlName="costoHonorariosMedicos" min="0" class="form-control">
                    </div>
                    <div class="col-md-2 mb-2" *ngIf="esServicioMedicoCategoria(formulario.get('categoria')?.value)">
                        <label>Insum. médic. $:</label>
                        <input type="number" formControlName="costoInsumosMedicos" min="0" class="form-control">
                    </div>
            </div>

            <div class="row"> 
                <div class="col-md-5 mb-2"><label >Ubicación:</label>
                    <input type="text" formControlName="ubicacion" class="form-control">
                </div>
                <div class="col-md-2 mb-2"><label>Stock mín:</label>
                    <input type="number" formControlName="stockMinimo" class="form-control">
                </div>
                <div class="col-md-2 mb-2"><label>Stock máx:</label>
                    <input type="number" formControlName="stockMaximo" class="form-control">
                </div>
                <div class="col-1 form-check-vertical" >
                    <label class="form-label">IVA</label>
                    <input type="checkbox" class="form-check-input" formControlName="iva">
                </div>
                <div class="col-1 form-check-vertical">
                    <label class="form-label">Genérico</label>
                    <input type="checkbox" class="form-check-input" formControlName="generico">
                </div>
            </div>

            <!-- Lotes -->
            <div formArrayName="lotes">
                <div style="text-align: center;">
                    <label class="subtitulo-edit"><strong>Lotes:</strong></label>
                </div>
                <div *ngFor="let lote of lotesFormArray.controls; let i = index" [formGroupName]="i"
                    class="edit-seccion">
                    <label>Lote:</label>
                    <input type="text" formControlName="lote" style="width: 7rem;">

                    <label>Caducidad:</label>
                    <input
                        type="text"
                        formControlName="fechaCaducidad"
                        inputmode="numeric"
                        maxlength="4"
                        placeholder="MMAA"
                        (input)="onCaducidadInput(i)"
                        style="width: 4rem;"
                    >
                    <small class="text-muted" *ngIf="getCaducidadPreview(i) as prev">
                        <strong style="color:rebeccapurple">{{ prev }}</strong>
                    </small>

                    <label style="margin-left: 3rem;">Cantidad:</label>
                    <input type="number" formControlName="cantidad" style="width: 5rem;">

                    <button class="btn-rojo-chico" type="button" (click)="eliminarLote(i)">Eliminar</button>

                    <div class="text-danger" style="font-size: 12px; margin-left: 10rem;"
                        *ngIf="lotesFormArray.at(i).get('fechaCaducidad')?.touched &&
                                lotesFormArray.at(i).get('fechaCaducidad')?.invalid">
                        <span *ngIf="lotesFormArray.at(i).get('fechaCaducidad')?.hasError('mmaaFormato')">
                            Captura 4 dígitos en formato MMAA (ej. 0228).
                        </span>
                        <span *ngIf="lotesFormArray.at(i).get('fechaCaducidad')?.hasError('mmaaMes')">
                            Mes inválido (01 a 12).
                        </span>
                        <span *ngIf="lotesFormArray.at(i).get('fechaCaducidad')?.hasError('mmaaPasada')">
                            No se permite una caducidad menor a hoy.
                        </span>
                    </div>
                </div>
                <div style="text-align: center;">
                    <button type="button" (click)="agregarLote()" class="btn-gris-chico">Agregar Lote</button>
                </div>
            </div>
            
        </form>
        </div>
        <hr>
        <div class="modal-buttons">
            <button class="btn-rojo-chico" (click)="cerrarModal()">Cancelar</button>
            <button class="btn-verde-chico btn-right" (click)="guardarProducto()"
                [disabled]="!formOkSinLotes()">Guardar</button>
        </div>

    </div>
</div>
